<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Student Help Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="..\css\contact.css">
</head>

<body>

<header>
        <h1>Student Help Portal</h1>
    </header>
<!-- NAVBAR -->
    <nav>
        <div class="navbar">
            <a href="../index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="policies.html">Policies</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>
<!-- MAIN -->
<div class="container">

    <div class="header">
        <h1>Contact Us</h1>
        <p>We’re here to help you anytime</p>
    </div>

    <div class="contact-grid">

        <!-- FORM -->
        <div class="card">
            <h2 style="margin-bottom: 20px;">Send Message</h2>

            <form id="contactForm">
                <div class="input-group">
                    <input type="text" placeholder="Your Name" required id="name">
                </div>

                <div class="input-group">
                    <input type="email" placeholder="Your Email" required id="email">
                </div>

                <div class="input-group" id="subject">
                    <input type="text" placeholder="Subject">
                </div>

                <div class="input-group">
                    <textarea rows="5" placeholder="Your Message" id="message"></textarea>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </div>

        <!-- INFO -->
        <div>

            <div class="card info-box">
                <h3>Email</h3>
                <p>support@studentportal.com</p>
            </div>

            <div class="card info-box">
                <h3>Phone</h3>
                <p>+91 98765 43210</p>
            </div>

            <div class="card info-box">
                <h3>Office</h3>
                <p>Student Help Center, India</p>
            </div>

            <div class="card info-box">
                <h3>Working Hours</h3>
                <p>Mon - Fri : 9AM - 6PM</p>
            </div>

        </div>

    </div>


</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Student Help Portal | All Rights Reserved
</div>

    <script src="..\javascript\contact.js"></script>
</body>
</html>
